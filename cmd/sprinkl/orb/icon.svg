<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none" aria-hidden="true">
  <defs>
    <!-- Match orbit-os-static-website/favicon.svg (Orbit brand hex) -->
    <linearGradient id="orbitAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c63ff" />
      <stop offset="100%" stop-color="#a78bfa" />
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="10" fill="#0a0f1a" />

  <!-- Same hex as favicon.svg -->
  <polygon
    points="32,11 49,21 49,43 32,53 15,43 15,21"
    fill="none"
    stroke="url(#orbitAccent)"
    stroke-width="4.2"
    stroke-linejoin="round"
  />

  <!-- </> compact, centered — does not reach the hex inner edge -->
  <g
    stroke="url(#orbitAccent)"
    stroke-width="2.2"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    opacity="0.95"
  >
    <path d="M 27 28.5 L 23 32 L 27 35.5" />
    <line x1="30" y1="35.5" x2="34.5" y2="28.5" />
    <path d="M 37 28.5 L 41 32 L 37 35.5" />
  </g>
  <g stroke="url(#orbitAccent)" stroke-width="1.4" stroke-linecap="round" opacity="0.5">
    <line x1="24" y1="41" x2="40" y2="41" />
  </g>
  <line
    x1="28"
    y1="39.5"
    x2="28"
    y2="42.5"
    stroke="url(#orbitAccent)"
    stroke-width="2"
    stroke-linecap="round"
    opacity="0.9"
  />
</svg>