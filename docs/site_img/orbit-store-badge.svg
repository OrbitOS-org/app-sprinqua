<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="190" height="82" viewBox="0 0 190 82">

  <!-- Background -->
  <rect width="190" height="82" rx="12" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>

  <!-- "Available in" -->
  <text x="95" y="19"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="10" letter-spacing="0.8" fill="#94a3b8">Available in</text>

  <!-- Orbit OS logo (white/transparent on dark background) -->
