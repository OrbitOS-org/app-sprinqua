  <!-- "Store" -->
  <text x="95" y="71"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="15" font-weight="700" letter-spacing="2" fill="#ffffff">STORE</text>

</svg>
