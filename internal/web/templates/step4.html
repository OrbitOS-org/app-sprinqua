{{define "step4"}}
<div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 sm:p-8">

  <!-- Progress -->
  <div class="flex items-center mb-7">
    <div class="flex items-center gap-1.5 flex-shrink-0">
      <div class="w-8 h-8 rounded-full bg-emerald-200 text-emerald-700 text-xs font-bold flex items-center justify-center">✓</div>
      <span class="hidden sm:inline text-xs text-slate-400">{{.S.progress_board}}</span>
    </div>
    <div class="flex-1 h-px bg-emerald-200 mx-1.5"></div>
    <div class="flex items-center gap-1.5 flex-shrink-0">
      <div class="w-8 h-8 rounded-full bg-emerald-200 text-emerald-700 text-xs font-bold flex items-center justify-center">✓</div>
      <span class="hidden sm:inline text-xs text-slate-400">{{.S.progress_zones}}</span>
    </div>
    <div class="flex-1 h-px bg-emerald-200 mx-1.5"></div>
    <div class="flex items-center gap-1.5 flex-shrink-0">
      <div class="w-8 h-8 rounded-full bg-emerald-200 text-emerald-700 text-xs font-bold flex items-center justify-center">✓</div>
      <span class="hidden sm:inline text-xs text-slate-400">{{.S.progress_test}}</span>
    </div>
    <div class="flex-1 h-px bg-emerald-200 mx-1.5"></div>
    <div class="flex items-center gap-1.5 flex-shrink-0">
      <div class="w-8 h-8 rounded-full bg-emerald-600 text-white text-xs font-bold flex items-center justify-center">4</div>
      <span class="hidden sm:inline text-xs font-semibold text-emerald-600">{{.S.progress_mqtt}}</span>
    </div>
  </div>

  <h2 class="text-lg font-semibold text-slate-800 mb-1">{{.S.step4_title}}</h2>
  <p class="text-slate-500 text-sm mb-5">{{.S.step4_subtitle}}</p>

  <form hx-post="/setup/step/4" hx-target="#wizard-content" hx-swap="innerHTML">

    <div class="flex items-center justify-between rounded-xl border border-slate-200 px-4 py-4 bg-slate-50 mb-4">
      <div class="pr-4">
        <p class="text-sm font-medium text-slate-700">{{.S.step4_toggle_label}}</p>
        <p class="text-xs text-slate-400 mt-0.5">{{.S.step4_toggle_desc}}</p>
      </div>
      <label class="relative inline-flex items-center cursor-pointer flex-shrink-0">
        <input type="checkbox" id="mqtt_toggle" name="mqtt_enabled" value="1" class="sr-only peer"
          onchange="document.getElementById('mqtt-fields').classList.toggle('hidden', !this.checked)">
        <div class="w-11 h-6 bg-slate-200 rounded-full peer peer-checked:bg-emerald-600
          after:content-[''] after:absolute after:top-0.5 after:left-0.5
          after:bg-white after:rounded-full after:h-5 after:w-5
          after:transition-all peer-checked:after:translate-x-5"></div>
      </label>
    </div>

    <div id="mqtt-fields" class="hidden space-y-3 mb-5">
      <div>
        <label class="block text-xs font-medium text-slate-500 mb-1">{{.S.step4_broker}}</label>
        <input type="text" name="mqtt_broker" placeholder="192.168.1.x" autocomplete="off" inputmode="url"
          class="w-full rounded-xl border border-slate-300 px-4 py-3 text-sm text-slate-800 bg-white focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent">
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">{{.S.step4_port}}</label>
          <input type="number" name="mqtt_port" value="1883" inputmode="numeric"
            class="w-full rounded-xl border border-slate-300 px-4 py-3 text-sm text-slate-800 bg-white focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">{{.S.step4_prefix}}</label>
          <input type="text" name="mqtt_prefix" value="sprinkl" autocomplete="off"
            class="w-full rounded-xl border border-slate-300 px-4 py-3 text-sm text-slate-800 bg-white focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent">
        </div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">{{.S.step4_user}}</label>
          <input type="text" name="mqtt_user" autocomplete="off"
            class="w-full rounded-xl border border-slate-300 px-4 py-3 text-sm text-slate-800 bg-white focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">{{.S.step4_pass}}</label>
          <input type="password" name="mqtt_pass" autocomplete="new-password"
            class="w-full rounded-xl border border-slate-300 px-4 py-3 text-sm text-slate-800 bg-white focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent">
        </div>
      </div>
    </div>

    <button type="submit"
      class="w-full bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-800 text-white font-semibold py-3 px-4 rounded-xl transition-colors text-sm">
      {{.S.btn_finish}}
    </button>
  </form>
</div>
{{end}}
