{{define "step2"}}
<div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 sm:p-8">

  <!-- Progress -->
  <div class="flex items-center mb-7">
    <div class="flex items-center gap-1.5 flex-shrink-0">
      <div class="w-8 h-8 rounded-full bg-emerald-200 text-emerald-700 text-xs font-bold flex items-center justify-center">✓</div>
      <span class="hidden sm:inline text-xs text-slate-400">{{.S.progress_board}}</span>
    </div>
    <div class="flex-1 h-px bg-emerald-200 mx-1.5"></div>
    <div class="flex items-center gap-1.5 flex-shrink-0">
      <div class="w-8 h-8 rounded-full bg-emerald-600 text-white text-xs font-bold flex items-center justify-center">2</div>
      <span class="hidden sm:inline text-xs font-semibold text-emerald-600">{{.S.progress_zones}}</span>
    </div>
    <div class="flex-1 h-px bg-slate-200 mx-1.5"></div>
    <div class="flex items-center gap-1.5 flex-shrink-0">
      <div class="w-8 h-8 rounded-full bg-slate-100 text-slate-400 text-xs font-bold flex items-center justify-center">3</div>
      <span class="hidden sm:inline text-xs text-slate-400">{{.S.progress_test}}</span>
    </div>
  </div>

  <h2 class="text-lg font-semibold text-slate-800 mb-1">{{.S.step2_title}}</h2>
  <p class="text-slate-500 text-sm mb-5">
    {{printf .S.step2_subtitle .Board.Name .Board.Channels}}
  </p>

  <form hx-post="/setup/step/2" hx-target="#wizard-content" hx-swap="innerHTML">

    <div class="space-y-3 mb-5">
      {{range $i, $z := .Zones}}
      <div class="rounded-xl border border-slate-200 p-4 bg-slate-50">
        <div class="flex items-center gap-2 mb-3">
          <span class="text-xs font-mono font-semibold text-white px-2 py-0.5 rounded-md"
                style="background-color: {{zoneColor $i}}">CH{{$z.Channel}}</span>
        </div>
        <div class="mb-2">
          <label class="block text-xs font-medium text-slate-500 mb-1">{{$.S.step2_zone_name}}</label>
          <input type="text" name="zone_{{$z.ID}}_name" value="{{$z.Name}}"
            class="w-full rounded-xl border border-slate-300 px-4 py-3 text-sm text-slate-800 bg-white focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent">
        </div>
        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1">{{$.S.step2_zone_type}}</label>
            <select name="zone_{{$z.ID}}_type"
              class="w-full rounded-xl border border-slate-300 px-3 py-3 text-sm text-slate-800 bg-white focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent appearance-none">
              <option value="drip"{{if eq $z.Type "drip"}} selected{{end}}>{{$.S.type_drip}}</option>
              <option value="sprinkler"{{if eq $z.Type "sprinkler"}} selected{{end}}>{{$.S.type_sprinkler}}</option>
              <option value="mist"{{if eq $z.Type "mist"}} selected{{end}}>{{$.S.type_mist}}</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-500 mb-1">{{$.S.step2_zone_max}}</label>
            <input type="number" name="zone_{{$z.ID}}_max" value="{{divInt $z.MaxSecs 60}}" min="1" max="240"
              inputmode="numeric"
              class="w-full rounded-xl border border-slate-300 px-4 py-3 text-sm text-slate-800 bg-white focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent">
          </div>
        </div>
      </div>
      {{end}}
    </div>

    <button type="submit"
      class="w-full bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-800 text-white font-semibold py-3 px-4 rounded-xl transition-colors text-sm">
      {{.S.btn_continue}}
    </button>
  </form>
</div>
{{end}}
